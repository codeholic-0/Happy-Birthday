<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surprise!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="intro-layer">
        <div id="gift-box-container">
            <div class="gift-bounce">🎁</div>
            <p class="gift-text">Tap to open...</p>
        </div>
    </div>

    <div class="twilight-background"></div>
    <div class="stars"></div> <div class="ribbon-banner hidden">
        🎉 SURPRISE! 🎉
    </div>

    <div class="main-content hidden" id="main-party">
        
        <div class="center-stage glass-panel">
            <h1 class="glow-title">HAPPY BIRTHDAY<br><span id="friendName">Debankan</span></h1>
            <p class="subtitle">MANY MANY RETURNS OF THE DAY ✨</p>
            
            <div class="cake-display">🎂</div>

            <div class="polaroid main-photo hidden-on-start" style="--rot: 1.5deg; --delay: 0.1s">
                <img src="images/main.jpg" alt="Main Memory">
                <p class="caption">The Star of the Show 🌟</p>
            </div>

            <div class="message-box">~From Debankan 😶‍🌫️</div>
        </div>

        <div class="side-panel">
            <div class="polaroid hidden-on-start" style="--rot: -6deg; --delay: 0.3s">
                <img src="images/damn.jpg" alt="Memory">
                <p class="caption">👀🔥</p>
            </div>
            <div class="polaroid hidden-on-start" style="--rot: 6deg; --delay: 0.5s">
                <img src="images/durga_puja.jpg" alt="Memory">
                <p class="caption">😇</p>
            </div>
        </div>

        <div class="side-panel">
            <div class="polaroid hidden-on-start" style="--rot: 4deg; --delay: 0.7s">
                <img src="images/school.jpg" alt="Memory">
                <p class="caption">👻</p>
            </div>
            <div class="polaroid hidden-on-start" style="--rot: -5deg; --delay: 0.9s">
                <img src="images/wtf.jpg" alt="Memory">
                <p class="caption">🤣</p>
            </div>
        </div>
        
        <div class="footer-spacer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
