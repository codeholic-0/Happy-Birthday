<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surprise!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-layer bg-sunset"></div>
    <div class="bg-layer bg-twilight" id="bg-twilight"></div>
    <div class="bg-layer bg-sunflower" id="bg-sunflower"></div>

    <canvas id="stardust-canvas"></canvas>

    <div id="intro-layer">
        <div id="gift-box-container">
            <div class="gift-bounce">🎁</div>
            <p class="gift-text">Tap to open...</p>
        </div>
    </div>

    <div id="constellation-layer" class="hidden">
        <p class="instruction-text">Tap the stars to uncover the memories...</p>
        
        <svg id="constellation-lines"></svg>

        <div class="star-node center-node hidden-core" style="top: 50%; left: 50%;" data-index="0">
            <div class="glowing-star" style="width: 30px; height: 30px; box-shadow: 0 0 25px 10px rgba(255, 215, 0, 1), 0 0 50px 15px rgba(255, 255, 255, 0.8);"></div>
            <div class="polaroid" style="--rot: 2deg;">
                <img src="https://picsum.photos/id/1011/300/300" alt="Center Memory">
                <p class="caption">The Core of It All</p>
            </div>
        </div>

        <div class="star-node" data-index="1">
            <div class="glowing-star"></div>
            <div class="polaroid" style="--rot: -5deg;">
                <img src="https://picsum.photos/id/1015/300/300" alt="Memory 1">
                <p class="caption">New Beginnings</p>
            </div>
        </div>
        <div class="star-node" data-index="2">
            <div class="glowing-star"></div>
            <div class="polaroid" style="--rot: 6deg;">
                <img src="https://picsum.photos/id/1025/300/300" alt="Memory 2">
                <p class="caption">Unforgettable</p>
            </div>
        </div>
        <div class="star-node" data-index="3">
            <div class="glowing-star"></div>
            <div class="polaroid" style="--rot: -4deg;">
                <img src="https://picsum.photos/id/1074/300/300" alt="Memory 3">
                <p class="caption">Always Smiling</p>
            </div>
        </div>
        <div class="star-node" data-index="4">
            <div class="glowing-star"></div>
            <div class="polaroid" style="--rot: 5deg;">
                <img src="https://picsum.photos/id/237/300/300" alt="Memory 4">
                <p class="caption">Best Friends</p>
            </div>
        </div>
        <div class="star-node" data-index="5">
            <div class="glowing-star"></div>
            <div class="polaroid" style="--rot: -8deg;">
                <img src="https://picsum.photos/id/1062/300/300" alt="Memory 5">
                <p class="caption">Wild Adventures</p>
            </div>
        </div>
        <div class="star-node" data-index="6">
            <div class="glowing-star"></div>
            <div class="polaroid" style="--rot: 3deg;">
                <img src="https://picsum.photos/id/1005/300/300" alt="Memory 6">
                <p class="caption">Late Nights</p>
            </div>
        </div>
    </div>

    <div id="climax-layer" class="hidden">
        <div class="surprise-banner hidden">🎉 SURPRISE! 🎉</div>
        <div class="center-stage glass-panel">
            
            <div class="sunflower sf-tl">🌻</div>
            <div class="sunflower sf-tr">🌻</div>
            <div class="sunflower sf-bl">🌻</div>
            <div class="sunflower sf-br">🌻</div>

            <h1 class="glow-title">HAPPY BIRTHDAY<br><span id="friendName">ALEX</span></h1>
            <p class="subtitle">You are my sunshine ✨</p>
            
            <div class="final-photo-frame">
                <img src="https://picsum.photos/id/103/400/400" alt="Our Favorite Moment">
                <div class="frame-tape"></div>
            </div>
            <div class="cake-display">🎂</div>
        </div>
    </div>

    <div id="photo-overlay">
        <div class="overlay-polaroid">
            <img id="overlay-img" src="" alt="Memory">
            <p id="overlay-caption" class="caption"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
